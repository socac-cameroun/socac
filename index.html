.socac-footer-contact::after{content:'|';margin-left:14px;opacity:.65;}
.socac-footer-contact:last-child::after{display:none;}
.socac-phone-link{font-weight:700;}
.socac-contact-icon{font-size:1.1em;}
.socac-footer-socials{display:flex;justify-content:center;align-items:center;gap:14px;flex-wrap:wrap;}
.socac-social-link{width:48px;height:48px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff!important;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.08);text-decoration:none;transition:transform .2s ease, background .2s ease;}
.socac-social-link:hover{transform:translateY(-2px);background:rgba(255,255,255,.18);}
@media (max-width:700px){.socac-footer-copy{font-size:20px;}.socac-footer-contact-row{font-size:18px;gap:10px;}.socac-footer-contact::after{display:none;}.socac-footer-contact{width:100%;justify-content:center;}}
</style>
