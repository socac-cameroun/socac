<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SOCAC - Société Coopérative Agroalimentaire du Cameroun</title>
<link rel="canonical" href="./index.html"/>
<link rel="alternate" hreflang="fr" href="./fr/index.html"/>
<link rel="alternate" hreflang="en" href="./en/index.html"/>
<link rel="alternate" hreflang="x-default" href="./index.html"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
    --primary-green: #2D5A27;
    --primary-green-light: #3D7A37;
    --primary-green-dark: #1D3A17;
    --accent-gold: #C4A35A;
    --accent-gold-light: #D4B36A;
    --socac-orange: #F08A1E;
    --socac-orange-light: #FFAA44;
    --cream: #FAF8F5;
    --dark: #1A1A1A;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { min-height: 100%; }
body {
    font-family: 'Source Sans 3', sans-serif;
    background-color: var(--cream);
    color: var(--dark);
    line-height: 1.6;
}
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--primary-green) 0%, var(--primary-green-dark) 100%);
    position: relative;
    overflow: hidden;
    isolation: isolate;
    padding: 56px 22px;
}
.hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.22;
    z-index: 0;
}
.hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url('assets/logo-socac-official.jpg');
    background-repeat: no-repeat;
    background-position: center;
    background-size: min(820px, 64vw);
    opacity: 0.08;
    transform: scale(1.03);
    transform-origin: center;
    pointer-events: none;
    z-index: 0;
    animation: heroLogoFloat 10s ease-in-out infinite;
}
.hero-content {
    width: min(980px, 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
    padding-top: 180px;
}
.hero-text-panel {
    text-align: center;
    color: var(--socac-orange-light);
    text-shadow: 0 12px 36px rgba(0,0,0,0.20);
    max-width: 760px;
}
.hero-badge {
    display: inline-block;
    background: rgba(240, 138, 30, 0.16);
    border: 1px solid rgba(240, 138, 30, 0.45);
    color: var(--socac-orange-light);
    padding: 10px 24px;
    border-radius: 30px;
    font-size: 0.98rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.6px;
    margin-bottom: 22px;
    animation: fadeInUp 0.8s ease;
    backdrop-filter: blur(4px);
}
.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(4rem, 7vw, 5.8rem);
    margin: 0 0 8px;
    line-height: 0.95;
    color: var(--socac-orange-light);
    animation: fadeInUp 0.8s ease 0.15s both;
    letter-spacing: 2px;
}
.hero .subtitle-fr {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.9rem, 3vw, 2.7rem);
    color: var(--socac-orange-light);
    line-height: 1.16;
    margin: 0 0 6px;
    animation: fadeInUp 0.8s ease 0.3s both;
}
.hero .subtitle-en {
    font-size: clamp(1.15rem, 1.85vw, 1.6rem);
    color: var(--socac-orange-light);
    font-weight: 700;
    margin: 0 0 18px;
    animation: fadeInUp 0.8s ease 0.4s both;
}
.hero .tagline {
    font-size: clamp(1.16rem, 1.5vw, 1.34rem);
    color: var(--socac-orange-light);
    font-weight: 700;
    margin: 0 0 30px;
    animation: fadeInUp 0.8s ease 0.5s both;
}
.hero-buttons {
    display: flex;
    gap: 16px;
    justify-content: flex-start;
    flex-wrap: wrap;
    animation: fadeInUp 0.8s ease 0.65s both;
}
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 190px;
    padding: 15px 30px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.8px;
    transition: all 0.3s ease;
    cursor: pointer;
    border: 2px solid transparent;
}
.btn-primary {
    background: var(--socac-orange);
    color: #fff;
    box-shadow: 0 10px 28px rgba(240, 138, 30, 0.3);
}
.btn-primary:hover {
    background: var(--socac-orange-light);
    transform: translateY(-2px);
    box-shadow: 0 14px 34px rgba(240, 138, 30, 0.38);
}
.btn-secondary {
    background: transparent;
    color: var(--socac-orange-light);
    border-color: rgba(240, 138, 30, 0.92);
}
.btn-secondary:hover {
    background: var(--socac-orange);
    color: #ffffff;
    transform: translateY(-2px);
}
@keyframes heroLogoFloat {
    0%, 100% { transform: scale(1.03) translateY(0); }
    50% { transform: scale(1.05) translateY(-6px); }
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInLeft {
    from { opacity: 0; transform: translateX(-26px); }
    to { opacity: 1; transform: translateX(0); }
}
@media (max-width: 880px) {
    .hero::after {
        background-size: min(640px, 84vw);
        opacity: 0.08;
    }
    .hero-content {
        width: min(760px, 100%);
        padding-top: 180px;
    }
    .hero-text-panel {
        text-align: center;
    }
    .hero-buttons {
        justify-content: center;
    }
}
@media (max-width: 700px) {
    .hero {
        padding: 46px 18px;
    }
    .hero::after {
        background-size: min(420px, 90vw);
        animation: none;
    }
    .hero-content { padding-top: 130px; }
    .hero h1 { font-size: 3.35rem; }
    .hero .subtitle-fr { font-size: 1.7rem; }
    .hero .subtitle-en { font-size: 1.08rem; }
    .hero .tagline { font-size: 1.02rem; }
    .hero-buttons { gap: 12px; }
    .btn { min-width: 160px; padding: 14px 22px; font-size: 0.95rem; }
}
</style>
</head>
<body>
<section class="hero">
    <div class="hero-content">
        <div class="hero-text-panel">
            <div class="hero-badge">Bienvenue · Welcome</div>
            <h1>SOCAC</h1>
            <p class="subtitle-fr">Société Coopérative Agroalimentaire du Cameroun</p>
            <p class="subtitle-en">Cameroon Agri-Food Cooperative Society</p>
            <p class="tagline">Cultiver l’avenir et manger sainement · Cultivating the future, promoting healthy living</p>
            <div class="hero-buttons">
                <a class="btn btn-primary lang-choice" data-lang="fr" href="fr/index.html">Français</a>
                <a class="btn btn-secondary lang-choice" data-lang="en" href="en/index.html">English</a>
            </div>
        </div>
    </div>
</section>

<script>
(function(){
  // Mémoriser le choix de langue au clic
  var buttons=document.querySelectorAll('.lang-choice');
  buttons.forEach(function(btn){
    btn.addEventListener('click', function(){
      localStorage.setItem('socac_lang', btn.getAttribute('data-lang'));
    });
  });

  // Si l'utilisateur a déjà choisi une langue, rediriger automatiquement
  var saved=localStorage.getItem('socac_lang');
  if(saved){
    var dest = saved === 'en' ? 'en/index.html' : 'fr/index.html';
    window.location.replace(dest);
    return; // arrêter le reste
  }

  // Sinon détecter la langue du navigateur
  var lang = (navigator.language || navigator.userLanguage || 'fr').slice(0,2).toLowerCase();
  if(lang === 'en'){
    // Juste mettre en évidence le bouton EN sans forcer
    var pref=document.querySelector('.lang-choice[data-lang="en"]');
    if(pref){ pref.style.boxShadow='0 0 0 3px rgba(255,255,255,0.28)'; }
  } else {
    var pref=document.querySelector('.lang-choice[data-lang="fr"]');
    if(pref){ pref.style.boxShadow='0 0 0 3px rgba(255,255,255,0.28)'; }
  }
})();
</script>
</body>
</html>
