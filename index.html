<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SOCAC - Société Coopérative Agroalimentaire du Cameroun</title>
<meta content="0; url=fr/index.html" http-equiv="refresh"/>
<style>
        body {
            font-family: 'Source Sans 3', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #FAF8F5;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("assets/logo-digital.jpg");
            background-repeat: no-repeat;
            background-position: center 140px;
            background-size: 46%;
            background-attachment: fixed;
            opacity: 0.24;
            z-index: -2;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(250, 248, 245, 0.88);
            z-index: -1;
            pointer-events: none;
        }

        .loading {
            text-align: center;
        }
        .loading h1 {
            color: #2D5A27;
        }
        .landing-logo {
            width: 180px;
            height: 180px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 50%%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        }
        .lang-options {
            margin-top: 20px;
        }
        .lang-options a {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            background: #2D5A27;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
        }
        .lang-options a:hover {
            background: #C4A35A;
        }
    </style>
<style id="socac-footer-style">
.socac-custom-footer{background:linear-gradient(90deg,#173b0f 0%,#1d4d14 50%,#173b0f 100%)!important;color:#fff!important;padding:26px 0 22px!important;margin-top:40px;position:relative;overflow:hidden;}
.socac-custom-footer::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,255,255,.06) 0%,rgba(255,255,255,0) 60%);pointer-events:none;}
.socac-footer-inner{position:relative;z-index:1;text-align:center;max-width:1100px;margin:0 auto;padding:0 10px;}
.socac-footer-copy{font-size:clamp(18px,1.5vw,22px);line-height:1.45;margin:0 0 16px;font-weight:600;color:#fff;}
.socac-brand-gold{color:#c9a24c;}
.socac-footer-contact-row{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;align-items:center;margin:0 auto 14px;font-size:clamp(14px,1.15vw,18px);}
.socac-footer-contact{color:#fff!important;text-decoration:none;display:inline-flex;align-items:center;gap:8px;font-weight:500;}
.socac-footer-contact::after{content:'|';margin-left:10px;opacity:.55;}
.socac-footer-contact:last-child::after{display:none;}
.socac-phone-link{font-weight:700;}
.socac-contact-icon{font-size:0.95em;}
.socac-footer-socials{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;}
.socac-social-link{width:40px;height:40px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff!important;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.08);text-decoration:none;transition:transform .2s ease, background .2s ease;font-size:15px;}
.socac-social-link:hover{transform:translateY(-2px);background:rgba(255,255,255,.18);}
@media (max-width:700px){.socac-footer-copy{font-size:17px;}.socac-footer-contact-row{font-size:14px;gap:8px;}.socac-footer-contact::after{display:none;}.socac-footer-contact{width:100%;justify-content:center;}}
</style>
</head>
<body>
<div class="loading">
<img alt="SOCAC logo" class="landing-logo" src="assets/logo-digital.jpg"/>
<h1>SOCAC</h1>
<p>Redirection en cours... / Redirecting...</p>
<div class="lang-options">
<a href="fr/index.html">🇫🇷 Français</a>
<a href="en/index.html">🇬🇧 English</a>
</div>
</div>
</body>
</html>
