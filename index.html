<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SOCAC - Société Coopérative Agroalimentaire du Cameroun</title>
<link rel="canonical" href="./index.html"/>
<link rel="alternate" hreflang="fr" href="./fr/index.html"/>
<link rel="alternate" hreflang="en" href="./en/index.html"/>
<link rel="alternate" hreflang="x-default" href="./index.html"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
    --primary-green: #2D5A27;
    --primary-green-light: #3D7A37;
    --primary-green-dark: #1D3A17;
    --accent-gold: #C4A35A;
    --accent-gold-light: #D4B36A;
    --cream: #FAF8F5;
    --dark: #1A1A1A;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { min-height: 100%; }
body {
    font-family: 'Source Sans 3', sans-serif;
    background-color: var(--cream);
    color: var(--dark);
    line-height: 1.6;
}
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--primary-green) 0%, var(--primary-green-dark) 100%);
    position: relative;
    overflow: hidden;
    isolation: isolate;
    padding: 60px 20px;
}
.hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.22;
    z-index: 0;
}
.hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url('assets/logo-home-main.jpg');
    background-repeat: no-repeat;
    background-position: center 26%;
    background-size: min(700px, 74vw);
    opacity: 0.14;
    transform: scale(1.025);
    transform-origin: center;
    pointer-events: none;
    z-index: 0;
    animation: heroLogoFloat 10s ease-in-out infinite;
}
.hero-content {
    text-align: center;
    color: white;
    position: relative;
    z-index: 2;
    max-width: 980px;
    text-shadow: 0 10px 30px rgba(0,0,0,0.20);
    padding-top: clamp(300px, 36vh, 390px);
}
.hero-badge {
    display: inline-block;
    background: var(--accent-gold);
    color: var(--dark);
    padding: 11px 30px;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    margin-bottom: 24px;
    animation: fadeInUp 0.8s ease;
}
.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(4.25rem, 8.4vw, 5.8rem);
    margin: 0 auto 12px;
    line-height: 1;
    color: var(--accent-gold);
    text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    animation: fadeInUp 0.8s ease 0.15s both;
    letter-spacing: 2px;
}
.hero .subtitle-fr {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.1rem, 3.35vw, 3rem);
    color: #fff;
    line-height: 1.2;
    margin: 0 auto 8px;
    max-width: 1000px;
    animation: fadeInUp 0.8s ease 0.3s both;
}
.hero .subtitle-en {
    font-size: clamp(1.3rem, 2.15vw, 1.9rem);
    color: var(--accent-gold-light);
    font-weight: 600;
    margin: 0 auto 16px;
    animation: fadeInUp 0.8s ease 0.4s both;
}
.hero .tagline {
    font-size: clamp(1.18rem, 1.72vw, 1.5rem);
    color: #ffffff;
    font-weight: 700;
    margin: 0 auto 28px;
    animation: fadeInUp 0.8s ease 0.5s both;
}

.prompt {
    font-size: clamp(1.14rem, 1.55vw, 1.32rem);
    color: #ffffff;
    font-weight: 700;
    margin: 0 auto 30px;
    animation: fadeInUp 0.8s ease 0.55s both;
}

.hero-buttons {
    display: flex;
    gap: 18px;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeInUp 0.8s ease 0.65s both;
}
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 200px;
    padding: 16px 34px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    cursor: pointer;
    border: 2px solid transparent;
}
.btn-primary {
    background: var(--accent-gold);
    color: var(--dark);
}
.btn-primary:hover {
    background: var(--accent-gold-light);
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(196, 163, 90, 0.4);
}
.btn-secondary {
    background: transparent;
    color: white;
    border-color: rgba(255,255,255,0.92);
}
.btn-secondary:hover {
    background: white;
    color: var(--primary-green);
    transform: translateY(-2px);
}

.choice-note {
    margin-top: 18px;
    font-size: 0.98rem;
    color: rgba(255,255,255,0.78);
    animation: fadeInUp 0.8s ease 0.75s both;
}

@keyframes heroLogoFloat {
    0%, 100% { transform: scale(1.025) translateY(0); }
    50% { transform: scale(1.04) translateY(-6px); }
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
@media (max-width: 700px) {
    .hero::after {
        background-position: center 20%;
        background-size: min(420px, 82vw);
        opacity: 0.12;
        animation: none;
    }
    .hero-content {
        max-width: 92%;
        padding-top: 245px;
    }
    .hero h1 { font-size: 3.2rem; }
    .hero .subtitle-fr { font-size: 1.62rem; }
    .hero .subtitle-en { font-size: 1.08rem; }
    .hero .tagline, .prompt { font-size: 1.06rem; }
    .hero-buttons { gap: 14px; }
    .btn { min-width: 170px; padding: 15px 22px; font-size: 0.95rem; }
}
</style>
</head>
<body>
<section class="hero">
    <div class="hero-content">
        <div class="hero-badge">Bienvenue · Welcome</div>
        <h1>SOCAC</h1>
        <p class="subtitle-fr">Société Coopérative Agroalimentaire du Cameroun</p>
        <p class="subtitle-en">Cameroon Agri-Food Cooperative Society</p>
        <p class="tagline">Cultiver l’avenir et manger sainement · Cultivating the future, promoting healthy living</p>
        <p class="prompt">Choisissez votre langue de navigation / Choose your browsing language</p>
        <div class="hero-buttons">
            <a class="btn btn-primary lang-choice" data-lang="fr" href="fr/index.html">Français</a>
            <a class="btn btn-secondary lang-choice" data-lang="en" href="en/index.html">English</a>
        </div>
     </div>
</section>

<script>
(function(){
  var buttons=document.querySelectorAll('.lang-choice');
  buttons.forEach(function(btn){
    btn.addEventListener('click', function(){
      localStorage.setItem('socac_lang', btn.getAttribute('data-lang'));
    });
  });
  var saved=localStorage.getItem('socac_lang');
  if(saved){
    var pref=document.querySelector('.lang-choice[data-lang="'+saved+'"]');
    if(pref){ pref.style.boxShadow='0 0 0 3px rgba(255,255,255,0.18)'; }
  }
})();
</script>
</body>
</html>
